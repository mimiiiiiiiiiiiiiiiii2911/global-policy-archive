<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Policy Observer | Diplomatic Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div id="google_translate_element"></div>

    <div class="container">
        <header>
            <h1>Global Policy Observer</h1>
            <div class="tagline">Multilateralism &amp; Strategic Governance Intelligence Archive</div>
        </header>

        <div class="feed-toolbar">
            <button
                type="button"
                id="btnToggleCompose"
                class="btn-open-compose"
                aria-expanded="false"
                aria-controls="composePanel"
            >
                Đăng bài viết
            </button>
        </div>

        <section id="composePanel" class="compose-panel" aria-label="Form đăng bài" hidden>
            <p class="compose-intro">
                Chia sẻ bài phân tích hoặc tin tức. Bài đăng công khai và bất kỳ ai sử dụng trang này đều có thể xóa bài đăng đó.
            </p>
            <div class="compose-panel-head">
                <h2 class="compose-panel-title">Tin mới</h2>
                <button type="button" id="btnCloseCompose" class="btn-close-compose">Đóng</button>
            </div>
            <label class="visually-hidden" for="categoryInput">Chủ đề</label>
            <select id="categoryInput">
                <option value="Ngoại giao nước">Ngoại giao nước</option>
                <option value="An ninh toàn cầu">An ninh toàn cầu</option>
                <option value="Cải cách LHQ">Cải cách LHQ</option>
                <option value="Nhân quyền">Nhân quyền</option>
            </select>
            <label class="visually-hidden" for="statusInput">Nội dung</label>
            <textarea id="statusInput" placeholder="Bắt đầu phân tích..." rows="6"></textarea>
            <button type="button" id="btnPost" class="btn-post">Xuất bản tin</button>
        </section>

        <div id="loading" class="loading">Connecting to archive...</div>
        <div id="feed"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./main.js" defer></script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" defer></script>
</body>
</html>
